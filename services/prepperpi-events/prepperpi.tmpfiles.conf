# /usr/lib/tmpfiles.d/prepperpi.conf
# Ensures /run/prepperpi/ exists with sticky world-write perms so any
# of our services (running under different users — root, prepperpi,
# prepperpi-admin) can drop their per-service runtime files there.
d /run/prepperpi 1777 root root -

# events.lock is the cross-user serialization point for emit-event.py.
# Pre-created mode 0666 so any user can open(O_RDWR) the inode and
# fcntl.flock it; without this, whichever user creates it first owns
# it 0644 and subsequent emitters from other users fail with EACCES.
f /run/prepperpi/events.lock 0666 root root -
