# Monthly catalog refresh: re-extract every country in regions.json
# against the current Protomaps planet PMTiles, capture the actual
# z0-15 extract size, and open a PR with the diff.
#
# Trigger: monthly cron (06:00 UTC on the 1st) or manual dispatch.
#
# Runner sizing
# =============
# A full pass downloads roughly 100-150 GB and may peak at ~80 GB of
# concurrent on-disk extracts. GitHub's standard ubuntu runners ship
# with 14 GB of disk — not enough. Wire this against either:
#
#   * a self-hosted runner with ≥250 GB disk + a fast pipe, or
#   * an `ubuntu-latest-large` (paid / GHE) / `ubuntu-24.04-large` runner,
#     which currently provisions ~150 GB disk
#
# The helper script writes its measurements sidecar after every country,
# so a runner that times out at 6h can be re-triggered and resume from
# where it left off — just commit the partial measurements file first
# (or run twice in succession in the same job).

name: Recalibrate map region sizes

on:
  schedule:
    # 06:00 UTC on the 1st of each month. Avoids US-business-hours
    # tile-CDN traffic. Update the day if Protomaps' build cadence
    # ever changes.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated ISO codes to limit the run to (default: all 195)"
        required: false
        default: ""
      concurrency:
        description: "Parallel pmtiles extracts"
        required: false
        default: "6"

permissions:
  contents: write
  pull-requests: write

jobs:
  recalibrate:
    # Adjust this label to match your runner pool. Standard GHA runners
    # don't have enough disk; this job will fail at the first big-country
    # extract.
    runs-on: ubuntu-latest-large
    timeout-minutes: 240

    env:
      PMTILES_VERSION: "1.30.2"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pmtiles binary
        run: |
          set -euo pipefail
          tarball="go-pmtiles_${PMTILES_VERSION}_Linux_x86_64.tar.gz"
          url="https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VERSION}/${tarball}"
          curl -sL "$url" | tar -xz -C /usr/local/bin pmtiles
          /usr/local/bin/pmtiles version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run recalibration
        env:
          COUNTRIES: ${{ inputs.countries }}
          CONC: ${{ inputs.concurrency || '6' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/pmtiles-recalibrate-extracts
          extra=()
          if [[ -n "$COUNTRIES" ]]; then
            extra+=(--countries "$COUNTRIES")
          fi
          # Allow a non-zero exit code when individual country extracts fail —
          # we still want to ship the partial improvements via a PR. The
          # workflow fails only if NO countries succeed, surfaced through
          # the `success_count` step output below.
          python3 services/prepperpi-tiles/recalibrate-region-sizes.py \
            --catalog services/prepperpi-tiles/regions.json \
            --measurements services/prepperpi-tiles/recalibration-measurements.json \
            --temp-dir /tmp/pmtiles-recalibrate-extracts \
            --concurrency "$CONC" \
            --json-progress \
            "${extra[@]}" \
            > /tmp/recalibrate.jsonl \
            || echo "recalibration finished with failures"
          tail -50 /tmp/recalibrate.jsonl || true

      - name: Diff catalog
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet services/prepperpi-tiles/regions.json \
             services/prepperpi-tiles/recalibration-measurements.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git --no-pager diff --stat \
            services/prepperpi-tiles/regions.json \
            services/prepperpi-tiles/recalibration-measurements.json

      - name: Open PR with refreshed catalog
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stamp=$(date -u +%Y%m%d)
          branch="recalibrate/${stamp}"
          git config user.email "actions@github.com"
          git config user.name  "github-actions"
          git checkout -b "$branch"
          git add services/prepperpi-tiles/regions.json \
                  services/prepperpi-tiles/recalibration-measurements.json
          git commit -m "chore(maps): refresh region size estimates ($stamp)"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(maps): refresh region size estimates ($stamp)" \
            --body "$(printf 'Auto-generated by the monthly recalibration workflow.\n\nDiff is the catalog `estimated_bytes` plus the `recalibration-measurements.json` audit log.\n\nReview before merging — a malformed planet build or transient extract failure can produce wrong numbers; the audit log has per-country attempt counts and durations.\n')"
