# Monthly catalog refresh: re-extract every country in regions.json
# against the current Protomaps planet PMTiles, capture the actual
# z0-15 extract size, and open a PR with the diff.
#
# Trigger: monthly cron (06:00 UTC on the 1st) or manual dispatch.
#
# Runner sizing
# =============
# A full pass downloads roughly 100-150 GB and may peak at ~80 GB of
# concurrent on-disk extracts. GitHub's standard ubuntu runners ship
# with 14 GB of disk — not enough.
#
# We run on a self-hosted Docker runner (`myoung34/github-runner`) on
# the maintainer's NAS with the `nas-bigdisk` label. The runner sits
# Idle between monthly cron firings and never sees PR-author code
# (this workflow has no `pull_request` trigger).
#
# Alternative if the self-hosted runner is unavailable: flip
# `runs-on:` back to `ubuntu-latest-large` (paid GHA) which provisions
# ~150 GB disk.
#
# The helper script writes its measurements sidecar after every country,
# so a runner that times out at 6h can be re-triggered and resume from
# where it left off — just commit the partial measurements file first
# (or run twice in succession in the same job).

name: Recalibrate map region sizes

on:
  schedule:
    # 06:00 UTC on the 1st of each month. Avoids US-business-hours
    # tile-CDN traffic. Update the day if Protomaps' build cadence
    # ever changes.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated ISO codes to limit the run to (default: all 195)"
        required: false
        default: ""
      concurrency:
        description: "Parallel pmtiles extracts"
        required: false
        default: "6"
      refresh:
        description: "Re-measure countries even if they already have a measurement (passes --refresh to the script)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  recalibrate:
    runs-on: [self-hosted, linux, x64, nas-bigdisk]
    timeout-minutes: 240

    env:
      PMTILES_VERSION: "1.30.2"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pmtiles binary
        run: |
          set -euo pipefail
          tarball="go-pmtiles_${PMTILES_VERSION}_Linux_x86_64.tar.gz"
          url="https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VERSION}/${tarball}"
          curl -sL "$url" | tar -xz -C /usr/local/bin pmtiles
          /usr/local/bin/pmtiles version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run recalibration
        env:
          COUNTRIES: ${{ inputs.countries }}
          CONC: ${{ inputs.concurrency || '6' }}
          REFRESH: ${{ inputs.refresh }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/pmtiles-recalibrate-extracts
          extra=()
          if [[ -n "$COUNTRIES" ]]; then
            extra+=(--countries "$COUNTRIES")
          fi
          # `inputs.refresh` is "true"/"false" string for type:boolean
          # workflow_dispatch inputs; cron-triggered runs leave REFRESH
          # empty, which means "use script defaults" (i.e. skip already-
          # measured countries).
          if [[ "$REFRESH" == "true" ]]; then
            extra+=(--refresh)
          fi
          # Allow a non-zero exit code when individual country extracts fail —
          # we still want to ship the partial improvements via a PR. The
          # workflow fails only if NO countries succeed, surfaced through
          # the `success_count` step output below.
          python3 services/prepperpi-tiles/recalibrate-region-sizes.py \
            --catalog services/prepperpi-tiles/regions.json \
            --measurements services/prepperpi-tiles/recalibration-measurements.json \
            --temp-dir /tmp/pmtiles-recalibrate-extracts \
            --concurrency "$CONC" \
            --json-progress \
            "${extra[@]}" \
            > /tmp/recalibrate.jsonl \
            || echo "recalibration finished with failures"
          tail -50 /tmp/recalibrate.jsonl || true

      - name: Diff catalog
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet services/prepperpi-tiles/regions.json \
             services/prepperpi-tiles/recalibration-measurements.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git --no-pager diff --stat \
            services/prepperpi-tiles/regions.json \
            services/prepperpi-tiles/recalibration-measurements.json

      - name: Open PR with refreshed catalog
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stamp=$(date -u +%Y%m%d)
          branch="recalibrate/${stamp}"
          git config user.email "actions@github.com"
          git config user.name  "github-actions"
          git checkout -b "$branch"
          git add services/prepperpi-tiles/regions.json \
                  services/prepperpi-tiles/recalibration-measurements.json
          git commit -m "chore(maps): refresh region size estimates ($stamp)"
          git push -u origin "$branch"
          # Open the PR. Maintainer manually squash-merges with admin
          # bypass — `lint-and-test` will never satisfy the ruleset's
          # required check on this PR because GitHub's recursion-
          # prevention rule blocks GITHUB_TOKEN-opened PRs from
          # triggering workflows. We explored several auto-merge paths
          # (PAT, integration bypass actor on the ruleset, a
          # workflow_dispatch chain into ci.yml). The lifetime cost of
          # one admin-bypass click per month is below the engineering
          # bar to fix this in any of those ways; revisit if
          # contributors join, or if GitHub adds Integration bypass at
          # the repository ruleset level (currently org-only).
          gh pr create \
            --title "chore(maps): refresh region size estimates ($stamp)" \
            --body "$(printf 'Auto-generated by the monthly recalibration workflow.\n\nDiff is `estimated_bytes` in regions.json (when sizes have drifted) plus the `recalibration-measurements.json` audit log.\n\n**Merge requires admin bypass.** Bot-opened PRs do not trigger workflows, so `lint-and-test` will not satisfy the required-status-check rule on its own. The change is content metadata only — nothing CI exercises is touched — so eyeball the diff and squash-merge with admin override.\n')"
